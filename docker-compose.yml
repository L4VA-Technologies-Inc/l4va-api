version: "3.9"

services:
  l4va-api:
    container_name: l4va-api
    build:
      context: ./l4va-api
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000" 
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - l4va-network
networks:
  l4va-network:
    driver: bridge
