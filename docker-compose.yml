version: "3.9"

services:
  l4va-api-blue:
    container_name: l4va-api-blue
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      REDIS_HOST: l4va-redis
      REDIS_PORT: 6379
      PORT: 3000
    networks:
      - l4va-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  l4va-api-green:
    container_name: l4va-api-green
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      REDIS_HOST: l4va-redis
      REDIS_PORT: 6379
      PORT: 3000
    networks:
      - l4va-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  l4va-network:
    external: true
